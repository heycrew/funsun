<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍品信息聚合系统 v3.0</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔍 拍品信息聚合系统</h1>
            <p class="subtitle">逐条分析拍品数据，自动生成直播间解说稿</p>
        </header>

        <!-- 固定飞书链接，隐藏输入框 -->
        <input type="hidden" id="feishuUrl"
            value="https://nyl00fatmt.feishu.cn/base/MbecbVJQ5aVQjBsWvGRcbEg6nMg?table=tblR6lIIRP1C5nyW&view=vewb58B32m" />

        <section class="input-section">
            <div class="input-group" style="justify-content: center;">
                <button id="analyzeBtn" onclick="startAnalyze()">
                    <span id="btnText">强制更新</span>
                    <span id="btnLoading" class="hidden">分析中...</span>
                </button>
                <button id="stopBtn" class="stop-btn hidden" onclick="stopAnalyze()">停止分析</button>
                <button id="pipBtn" class="pip-btn" onclick="openPipWindow()" title="打开桌面看板 (PiP始终置顶)">🖥 桌面看板</button>
                <a id="adminLink" href="/admin" style="display:none;padding:10px 18px;background:#2c3e50;color:#fff;border-radius:8px;text-decoration:none;font-size:0.9em;font-weight:600;white-space:nowrap">⚙ 管理后台</a>
                <span style="flex:1"></span>
                <span id="userDisplay" style="color:#888;font-size:0.85em;white-space:nowrap"></span>
                <a id="logoutLink" href="/api/logout" style="color:#e74c3c;font-size:0.8em;text-decoration:none;white-space:nowrap;margin-left:8px">退出</a>
            </div>
        </section>

        <section id="errorSection" class="error-section hidden">
            <div class="error-card"><span class="error-icon">!</span><span id="errorText"></span></div>
        </section>

        <section id="progressBar" class="progress-section hidden">
            <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
            <p class="progress-text" id="pText">准备中...</p>
        </section>

        <section id="summarySection" class="summary-section hidden">
            <div class="summary-card">
                <h2>专场概要</h2>
                <div class="summary-stats" id="summaryStats"></div>
                <div class="summary-divider"></div>
                <div class="summary-kilns">
                    <h3>窑口分布</h3>
                    <div id="kilnBars"></div>
                    <div id="kilnToggle" style="display:none;text-align:center;margin-top:6px">
                        <button class="kiln-toggle-btn" onclick="toggleKilnBars()" id="kilnToggleBtn">查看更多</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="resultSection" class="result-section hidden">
            <div class="card">
                <h2 class="card-title">拍品列表 <span class="badge" id="totalBadge">0</span></h2>
                <div class="batch-bar" id="batchBar" style="display:none;align-items:center;gap:10px;padding:8px 0;flex-wrap:wrap">
                    <select class="voice-select" id="globalVoice">
                        <option value="zh_male_wennuanahu_uranus_bigtts">AI音色(系统)</option>
                        <option value="S_2fqs4pf62">志波(复刻)</option>
                        <option value="S_1fqs4pf62">锦卉(复刻)</option>
                        <option value="S_0fqs4pf62">杨雪(复刻)</option>
                        <option value="S_Zeqs4pf62">培文(复刻)</option>
                    </select>
                    <select class="voice-select" id="globalSpeed" style="width:auto" onchange="localStorage.setItem('gen_speed',this.value)">
                        <option value="0.75">0.75x</option>
                        <option value="1.0" selected>1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2.0">2.0x</option>
                    </select>
                    <button class="batch-btn" onclick="batchGenerate('template')" id="batchTemplateBtn">📋 批量生成固定介绍</button>
                    <button class="batch-btn" onclick="batchGenerate('commentary')" id="batchCommentaryBtn">🎙 批量生成拍品亮点</button>
                    <span class="batch-progress" id="batchProgress" style="display:none"></span>
                </div>
                <div class="table-wrap">
                    <table class="data-table" id="mainTable">
                        <thead>
                            <tr>
                                <th style="width:30px;padding:8px 4px">#</th>
                                <th style="width:38%">拍品名字</th>
                                <th style="width:9em">窑口</th>
                                <th style="width:9em">款识</th>
                                <th style="width:7em">起拍价</th>
                                <th style="width:7em">参考价</th>
                                <th style="width:90px">音频状态</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        let allItems = [];
        let resultsMap = {};
        let expandedRow = null;
        let totalCount = 0;
        let doneCount = 0;
        let abortController = null;
        let audioState = {};
        // 全局播放倍速（持久化）
        var _saved = localStorage.getItem('playback_rate');
        let _playbackRate = _saved ? (parseFloat(_saved) || 1.0) : 1.0;
        // 生成倍速恢复
        (function() {
            var savedSpeed = localStorage.getItem('gen_speed');
            if (savedSpeed) {
                var el = document.getElementById('globalSpeed');
                if (el) el.value = savedSpeed;
            }
        })();
        // ===== 桌面看板 WebSocket 连接 =====
        let _ws = null;
        let _wsReconnectTimer = null;
        let _wsReconnectDelay = 3000;
        let _wsLastSend = 0;
        let _wsActiveIdx = -1;
        let _wsActiveType = 'commentary';

        function wsConnect() {
            if (_ws && (_ws.readyState === WebSocket.OPEN || _ws.readyState === WebSocket.CONNECTING)) return;
            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var url = proto + '//' + location.host + '/ws/playback';
            _ws = new WebSocket(url);
            _ws.onopen = function() {
                _ws.send(JSON.stringify({type:'hello',role:'browser'}));
                _wsReconnectDelay = 3000;
                console.log('WebSocket 已连接');
            };
            _ws.onmessage = function(e) {
                try {
                    var msg = JSON.parse(e.data);
                    wsHandleControl(msg);
                    // 转发给 PiP 看板：playback_state / idle / no_audio
                    if (msg.type === 'playback_state' || msg.type === 'idle' || msg.type === 'no_audio') {
                        sendToPip(msg);
                    }
                } catch(err) { console.error('WS消息解析失败:', err); }
            };
            _ws.onclose = function() {
                _ws = null;
                if (_wsReconnectTimer) clearTimeout(_wsReconnectTimer);
                _wsReconnectTimer = setTimeout(function() {
                    wsConnect();
                    _wsReconnectDelay = Math.min(_wsReconnectDelay * 2, 30000);
                }, _wsReconnectDelay);
            };
            _ws.onerror = function() { _ws.close(); };
        }

        function wsSend(msg) {
            if (_ws && _ws.readyState === WebSocket.OPEN) {
                _ws.send(JSON.stringify(msg));
            }
            // 同时转发给 PiP 看板（WebSocket 服务端不会回显给自己的消息）
            if (msg.type === 'playback_state' || msg.type === 'idle' || msg.type === 'no_audio') {
                sendToPip(msg);
            }
        }

        function wsHandleControl(msg) {
            if (msg.type !== 'control') return;
            var idx = msg.index;
            var type = msg.audio_type || 'commentary';
            var key = getAudioKey(idx, type);
            var st = audioState[key];
            switch (msg.action) {
                case 'play':
                case 'pause':
                case 'toggle':
                case 'seek':
                    if (!st) {
                        // 没有对应音频 → 回传 no_audio
                        wsSend({type:'no_audio', index:idx, audio_type:type});
                        return;
                    }
                    break;
            }
            switch (msg.action) {
                case 'play':
                    // 停止同拍品其他正在播放的音频，并重置进度
                    Object.keys(audioState).forEach(function(k) {
                        if (k !== key && audioState[k] && audioState[k].playing && audioState[k].idx === idx) {
                            audioState[k].audio.pause();
                            audioState[k].audio.currentTime = 0;
                            audioState[k].playing = false;
                            renderDualControls(audioState[k].idx, audioState[k].type);
                        }
                    });
                    st.audio.play(); st.playing = true; renderDualControls(idx, type);
                    _wsLastSend = 0; updateDualProgress(idx, type); break;
                case 'pause':
                    st.audio.pause(); st.playing = false; renderDualControls(idx, type);
                    _wsLastSend = 0; updateDualProgress(idx, type); break;
                case 'toggle':
                    toggleDualAudio(idx, type); break;
                case 'seek':
                    if (msg.position !== undefined && st.audio.duration) {
                        st.audio.currentTime = msg.position;
                        updateDualProgress(idx, type);
                    }
                    break;
                case 'select_item':
                    // 看板连接后自动展开指定拍品
                    var targetIdx = msg.index;
                    if (targetIdx !== undefined && allItems[targetIdx]) {
                        if (expandedRow !== null && expandedRow !== targetIdx) {
                            toggleExpand(expandedRow);
                        }
                        if (expandedRow !== targetIdx) {
                            toggleExpand(targetIdx);
                        }
                        // 立即推送拍品基础信息给看板（不等音频播放）
                        var info = resultsMap[targetIdx] || allItems[targetIdx];
                        wsSend({
                            type: 'playback_state',
                            index: targetIdx,
                            name: (info && info.name) || allItems[targetIdx].name || '',
                            audio_type: 'commentary',
                            playing: false,
                            current_time: 0,
                            duration: 0,
                            subtitle: '',
                            progress: 0
                        });
                    }
                    break;
                case 'prev_item':
                case 'next_item':
                    // 重置当前拍品所有音频进度
                    if (expandedRow !== null) {
                        Object.keys(audioState).forEach(function(k) {
                            if (audioState[k] && audioState[k].idx === expandedRow) {
                                audioState[k].audio.pause();
                                audioState[k].audio.currentTime = 0;
                                audioState[k].playing = false;
                            }
                        });
                    }
                    if (msg.action === 'prev_item' && expandedRow !== null && expandedRow > 0 && allItems[expandedRow - 1]) {
                        toggleExpand(expandedRow - 1);
                    } else if (msg.action === 'next_item' && expandedRow !== null && expandedRow < allItems.length - 1 && allItems[expandedRow + 1]) {
                        toggleExpand(expandedRow + 1);
                    }
                    break;
                case 'cycle_speed':
                    cyclePlaybackRate();
                    break;
                case 'set_speed':
                    if (msg.speed !== undefined) {
                        _playbackRate = msg.speed;
                        localStorage.setItem('playback_rate', msg.speed);
                        Object.keys(audioState).forEach(function(k) {
                            if (audioState[k] && audioState[k].audio) {
                                audioState[k].audio.playbackRate = _playbackRate;
                            }
                        });
                        Object.keys(audioState).forEach(function(k) {
                            if (audioState[k]) renderDualControls(audioState[k].idx, audioState[k].type);
                        });
                        _wsLastSend = 0;
                        if (_wsActiveIdx >= 0) updateDualProgress(_wsActiveIdx, _wsActiveType);
                    }
                    break;
            }
        }

        // 页面加载时连接
        wsConnect();

        // ===== 桌面看板 (Picture-in-Picture) =====
        var _pipWin = null;

        function openPipWindow() {
            if (_pipWin) {
                _pipWin.close();
                _pipWin = null;
                document.getElementById('pipBtn').classList.remove('pip-active');
                return;
            }
            if (!('documentPictureInPicture' in window)) {
                alert('您的浏览器不支持画中画看板，请使用 Chrome 116+ 或 Edge 116+');
                return;
            }
            document.getElementById('pipBtn').classList.add('pip-active');
            documentPictureInPicture.requestWindow({ width: 520, height: 340 })
                .then(function(pipWin) {
                    _pipWin = pipWin;
                    pipWin.document.title = '拍卖看板';
                    pipWin.document.head.innerHTML = '<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>' + getPipCSS() + '</style>';
                    pipWin.document.body.innerHTML = getPipHTML();
                    // 注入 JS（用 script 标签在 PiP 窗口执行）
                    var script = pipWin.document.createElement('script');
                    script.textContent = getPipJS();
                    pipWin.document.body.appendChild(script);

                    // 监听 PiP 窗口关闭
                    pipWin.addEventListener('pagehide', function() {
                        _pipWin = null;
                        document.getElementById('pipBtn').classList.remove('pip-active');
                    });

                    // 延迟等 PiP 脚本就绪后再推送状态
                    setTimeout(function() { sendCurrentStateToPip(); }, 300);
                })
                .catch(function(err) {
                    console.error('PiP 打开失败:', err);
                    _pipWin = null;
                    document.getElementById('pipBtn').classList.remove('pip-active');
                });
        }

        function sendToPip(msg) {
            if (_pipWin) {
                try { _pipWin.postMessage(msg, '*'); } catch(e) {}
            }
        }

        function sendCurrentStateToPip() {
            if (!_pipWin) return;
            // 找到当前展开的拍品
            if (expandedRow !== null && resultsMap[expandedRow]) {
                var d = resultsMap[expandedRow];
                sendToPip({ type:'playback_state', index:expandedRow, name:d.name||'', audio_type:'commentary', playing:false, current_time:0, duration:0, subtitle:'', progress:0 });
            } else if (allItems.length > 0) {
                sendToPip({ type:'playback_state', index:0, name:allItems[0].name||'', audio_type:'commentary', playing:false, current_time:0, duration:0, subtitle:'', progress:0 });
            }
        }

        // 主页面 ↔ PiP 看板：通过 postMessage 直接通信
        window.addEventListener('message', function(e) {
            if (!e.data) return;
            if (e.data.from !== 'auction_pip') return; // 只处理来自 PiP 的消息
            if (e.data.type === 'control') {
                wsHandleControl(e.data);
            } else if (e.data.type === 'select_item') {
                wsHandleControl(e.data);
            } else if (e.data.type === 'pip_ready') {
                sendCurrentStateToPip();
            }
        });

        async function fetchCoverImage(idx, code) {
            try {
                const resp = await fetch(`/api/item-cover?code=${encodeURIComponent(code)}`);
                const json = await resp.json();
                const area = document.getElementById(`coverArea-${idx}`);
                if (area && json.images && json.images.length > 0) {
                    let imgsHtml = '';
                    json.images.forEach((url, i) => {
                        imgsHtml += `<img src="${esc(url)}" class=\"cover-img\" onerror=\"this.style.display='none'\" onclick=\"window.open('${esc(url)}')\" title=\"点击查看大图\" />`;
                    });
                    area.innerHTML = `<div class=\"cover-gallery\">${imgsHtml}</div>`;
                } else if (area) {
                    area.style.display = 'none';
                }
            } catch (e) { console.error(e); }
        }

        async function loadMarketCovers(records) {
            if (!records || records.length === 0) return;
            // 先检查是否有缓存封面
            var hasAllCached = true;
            var missingIds = [];
            for (var i = 0; i < Math.min(records.length, 10); i++) {
                var r = records[i];
                if (r._cover_image) {
                    var el = document.getElementById('xc-thumb-' + r.id);
                    if (el) el.innerHTML = '<img src=\"' + esc(r._cover_image) + '\" class=\"xc-thumb\" onerror=\"this.style.display=\\\'none\\\'\" />';
                } else {
                    hasAllCached = false;
                    if (r.id) missingIds.push(r.id);
                }
            }
            if (hasAllCached || missingIds.length === 0) return;
            // 获取缺失的封面
            try {
                var resp = await fetch('/api/batch-covers?codes=' + encodeURIComponent(missingIds.join(',')));
                var data = await resp.json();
                var covers = data.covers || {};
                for (var cid in covers) {
                    var el = document.getElementById('xc-thumb-' + cid);
                    if (el && covers[cid]) {
                        el.innerHTML = '<img src=\"' + esc(covers[cid]) + '\" class=\"xc-thumb\" onerror=\"this.style.display=\\\'none\\\'\" />';
                        // 缓存到 record
                        for (var j = 0; j < records.length; j++) {
                            if (records[j].id == cid) { records[j]._cover_image = covers[cid]; break; }
                        }
                    }
                }
                // 回写缓存（异步，不阻塞）
                if (Object.keys(covers).length > 0) {
                    fetch('/api/cache/update-covers', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({covers:covers})}).catch(function(){});
                }
            } catch(e) { console.error(e); }
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
        }

        async function startAnalyze() {
            const url = document.getElementById('feishuUrl').value.trim();
            // 检查缓存是否一致，一致则弹窗确认
            document.getElementById('btnText').textContent = '⏳ 检查中...';
            try {
                var checkResp = await fetch('/api/cache-status?feishu_url=' + encodeURIComponent(url));
                var checkJson = await checkResp.json();
                document.getElementById('btnText').textContent = allItems.length > 0 ? '强制更新' : '开始分析';
                if (checkJson.matched) {
                    var confirmed = confirm('当前拍品清单没有任何变动，是否要重新分析？\n\n点击「确定」强制更新，「取消」则保留当前数据。');
                    if (!confirmed) return;
                }
            } catch(e) { document.getElementById('btnText').textContent = allItems.length > 0 ? '强制更新' : '开始分析'; }

            hideError();
            document.getElementById('resultSection').classList.add('hidden');
            showProgress();
            setAnalyzing(true);
            allItems = [];
            resultsMap = {};
            expandedRow = null;
            doneCount = 0;
            document.getElementById('batchBar').style.display = 'none';

            abortController = new AbortController();

            try {
                const resp = await fetch(`/api/analyze-all?feishu_url=${encodeURIComponent(url)}&force=true`, {
                    signal: abortController.signal
                });
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const msg = JSON.parse(line.slice(6));
                                handleMessage(msg);
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    // 用户主动停止
                    updateProgress(0, `已停止 (${doneCount}/${totalCount})`);
                    setTimeout(() => hideProgress(), 2000);
                } else {
                    showError('连接失败: ' + err.message);
                    hideProgress();
                }
            }
            setAnalyzing(false);
            abortController = null;
        }

        function stopAnalyze() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
            // 将所有"分析中"状态恢复
            for (let i = 0; i < allItems.length; i++) {
                if (!resultsMap[i]) {
                    document.getElementById(`action-${i}`).innerHTML =
                        '<span class="status-tag pending">等待中</span>';
                }
            }
        }

        function setAnalyzing(active) {
            document.getElementById('analyzeBtn').classList.toggle('hidden', active);
            document.getElementById('stopBtn').classList.toggle('hidden', !active);
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'start':
                    totalCount = msg.total;
                    allItems = msg.items;
                    document.getElementById('totalBadge').textContent = totalCount;
                    document.getElementById('resultSection').classList.remove('hidden');
                    document.getElementById('batchBar').style.display = 'flex';
                    buildTable();
                    buildSummary(msg.items);
                    updateProgress(0, msg.cached ? `缓存命中 ${totalCount}条` : `0/${totalCount}`);
                    break;

                case 'progress':
                    updateProgress(Math.round((doneCount / totalCount) * 100),
                        `${doneCount}/${totalCount}`);
                    setRowStatus(msg.index, 'searching');
                    break;

                case 'result':
                    doneCount++;
                    resultsMap[msg.data.index] = msg.data;
                    setRowStatus(msg.data.index, 'done');
                    const label = msg.data._cached ? '缓存' : `${doneCount}/${totalCount}`;
                    updateProgress(msg.data._cached ? 100 : Math.round((doneCount / totalCount) * 100), label);
                    // 更新名字颜色
                    if (msg.data._changed) {
                        var cell = document.querySelector('#row-' + msg.data.index + ' .name-cell');
                        if (cell) cell.classList.add('name-changed');
                    }
                    if (expandedRow === msg.data.index) {
                        renderExpandContent(msg.data.index, msg.data);
                    }
                    break;

                case 'done':
                    updateProgress(100, `完成 ${doneCount}/${totalCount}`);
                    setTimeout(() => hideProgress(), 1500);
                    document.getElementById('batchBar').style.display = 'flex';
                    // 重新触发预估（此时 resultsMap 已完整）
                    setTimeout(runPrediction, 300);
                    break;

                case 'error':
                    showError(msg.message);
                    hideProgress();
                    break;
            }
        }

        function buildSummary(items) {
            var total = items.length;
            var kilns = {};
            var totalPrice = 0;
            items.forEach(function(it) {
                var k = it.kiln || '未知';
                kilns[k] = (kilns[k] || 0) + 1;
                var p = parseFloat(String(it.starting_price || '0').replace(/[^0-9.]/g, ''));
                if (!isNaN(p)) totalPrice += p;
            });
            var uniqueKilns = Object.keys(kilns).length;

            // Stats
            document.getElementById('summaryStats').innerHTML =
                '<div class="summary-stat"><span class="val">' + total + '</span><span class="lbl">拍品总数</span></div>' +
                '<div class="summary-stat"><span class="val">' + uniqueKilns + '</span><span class="lbl">窑口数量</span></div>' +
                '<div class="summary-stat"><span class="val">¥' + totalPrice.toLocaleString() + '</span><span class="lbl">起拍价总和</span></div>' +
                '<div class="summary-stat predict-stat" id="predictCard"><span class="val predict-loading">⏳</span><span class="lbl">专场成交预估</span></div>';

            // Kiln bars (默认显示前3，超出隐藏)
            setTimeout(runPrediction, 500);
            var sortedKilns = Object.keys(kilns).sort(function(a,b){return kilns[b]-kilns[a];});
            var kb = '';
            sortedKilns.forEach(function(k, i){
                var pct = (kilns[k] / total * 100).toFixed(1);
                var extraCls = (i >= 3) ? ' kiln-hidden' : '';
                kb += '<div class="kiln-row' + extraCls + '"><span class="kname">' + k + '</span><span class="kbar-wrap"><span class="kbar" style="width:' + pct + '%"></span></span><span class="kinfo">' + kilns[k] + ' 件 · ' + pct + '%</span></div>';
            });
            document.getElementById('kilnBars').innerHTML = kb;
            if (sortedKilns.length > 3) {
                document.getElementById('kilnToggle').style.display = 'block';
                document.getElementById('kilnToggleBtn').textContent = '查看更多';
            } else {

        async function loadCachedAudioIfExists(idx, type) {
            var key = getAudioKey(idx, type);
            if (audioState[key] && audioState[key].url) return;
            var resp = await fetch('/api/cached-audio?index=' + idx + '&audio_type=' + type);
            if (!resp.ok) return;
            var blob = await resp.blob();
            if (blob.size < 500) return;
            var url = URL.createObjectURL(blob);
            var audio = new Audio(url);
            applyPlaybackRate(audio);
            var data = resultsMap[idx] || {};
            var text = getAudioText(data, type);
            var rawS = smartSplit(text);
            var tc = rawS.reduce(function(sum,s){return sum+s.length},0) || 1;
            var ca = 0;
            var sts = rawS.map(function(s){var st=ca/tc;ca+=s.length;return{text:s,start:st,end:ca/tc}});
            var itemName = data.name || ('item'+idx);
            var dateStr = new Date().toISOString().slice(0,10);
            var filename = (idx+1)+'_'+itemName+'_'+dateStr+'_'+getAudioLabel(type)+'_缓存.mp3'.replace(/[\\/:*?\"<>|]/g,'_');
            audioState[key] = {audio:audio, url:url, playing:false, filename:filename, sentenceTimings:sts, type:type, idx:idx};
            audio.addEventListener('timeupdate', function(){ updateDualProgress(idx,type); });
            audio.addEventListener('ended', function(){ if(audioState[key])audioState[key].playing=false; renderDualControls(idx,type); wsSend({type:'idle'}); });
            audio.addEventListener('play', function(){ _wsLastSend=0; updateDualProgress(idx,type); });
            var prefix = type === 'template' ? 'tpl-' : '';
            var player = document.getElementById(prefix + 'audioPlayer-' + idx);
            if (player) { player.style.display = 'flex'; player.innerHTML = '<div class=\"audio-controls\" id=\"' + prefix + 'audioControls-' + idx + '\"></div>'; }
            var ttsBtn = document.getElementById(prefix + 'ttsBtn-' + idx);
            if (ttsBtn) ttsBtn.style.display = 'none';
            renderDualControls(idx, type);
            // 更新列表音频状态
            var d = resultsMap[idx];
            if (d) {
                if (type === 'template') d._has_template_audio = true;
                else d._has_commentary_audio = true;
                updateAudioStatus(idx);
            }
        }

        function getAudioText(data, type) {
            if (type === 'template') {
                // 优先用后端预生成的 template_text，没有则前端拼接
                if (data && data.template_text) return data.template_text;
                // 前端根据拍品字段拼接固定话术
                var d = data || {};
                var idx = (d.index !== undefined) ? (d.index + 1) : '?';
                return '第' + idx + '号拍品,来自' + (d.name || '') + ',款识' + (d.inscription || d.kiln || '') + ',年份' + (d.era || '') + ',尺寸' + (d.size || '') + ',容量' + (d.capacity || '') + ',品相' + (d.condition || '') + ',市场参考价' + (d.estimate || '');
            }
            return (data && data.commentary) ? data.commentary : '';
        }

        function getAudioLabel(type) { return type === 'template' ? '固定模板' : 'AI解说稿'; }

        function cyclePlaybackRate() {
            var rates = [1.0, 1.25, 1.5, 2.0, 0.75];
            var cur = _playbackRate;
            var idx = rates.indexOf(cur);
            var next = rates[(idx + 1) % rates.length];
            _playbackRate = next;
            localStorage.setItem('playback_rate', next);
            // 应用到所有音频
            Object.keys(audioState).forEach(function(k) {
                if (audioState[k] && audioState[k].audio) {
                    audioState[k].audio.playbackRate = next;
                }
            });
            // 更新所有控件的倍速按钮
            Object.keys(audioState).forEach(function(k) {
                if (audioState[k]) renderDualControls(audioState[k].idx, audioState[k].type);
            });
        }

        function applyPlaybackRate(audio) {
            if (audio) audio.playbackRate = _playbackRate;
        }

        // 智能分句：中文标点断开，短句合并，目标每句 20-35 字
        function smartSplit(text) {
            // 中文标点切分（不含英文句号，避免切断小数点）
            var raw = text.split(/[。！？；：，、\n]+/).filter(function(s){ return s.trim().length > 0; });
            if (raw.length === 0) return [];
            var result = [];
            var buf = '';
            for (var i = 0; i < raw.length; i++) {
                var s = raw[i].trim();
                if (!buf) { buf = s; continue; }
                var combined = buf + '，' + s;
                if (combined.length > 35) {
                    result.push(buf);
                    buf = s;
                } else {
                    buf = combined;
                }
            }
            if (buf) result.push(buf);
            return result;
        }

                var tc = rawS.reduce(function(sum,s){return sum+s.length},0);

                audio.addEventListener('timeupdate', function(){ updateDualProgress(idx,type); });

                audio.addEventListener('play', function(){ _wsLastSend=0; updateDualProgress(idx,type); });
                audio.addEventListener('loadedmetadata', function(){ renderDualControls(idx,type); });
                await new Promise(function(resolve){ audio.addEventListener('canplay', resolve, {once:true}); setTimeout(resolve,5000); });

                    if (type === 'template') d._has_template_audio = true;

        function renderDualControls(idx, type) {
            var key = getAudioKey(idx, type); var st = audioState[key]; if (!st) return;
            var prefix = type === 'template' ? 'tpl-' : '';
            var container = document.getElementById(prefix + 'audioControls-' + idx);
            if (!container) return;
            var dur = st.audio.duration || 0; var cur = st.audio.currentTime || 0;
            var pct = dur > 0 ? Math.round((cur/dur)*100) : 0;
            container.innerHTML = '<button class=\"audio-play-btn\" onclick=\"toggleDualAudio(' + idx + ',\'' + type + '\')\">' + (st.playing ? '⏸' : '▶') + '</button>' +
                '<input type=\"range\" class=\"audio-progress\" value=\"' + pct + '\" min=\"0\" max=\"100\" oninput=\"seekDualAudio(' + idx + ',\'' + type + '\',this.value)\" />' +
                '<span class=\"audio-time\">' + formatTime(cur) + ' / ' + formatTime(dur) + '</span>' +
                '<a class=\"audio-download-btn\" href=\"' + st.url + '\" download=\"' + (st.filename||'audio.mp3') + '\" title=\"下载音频\">⬇</a>' +
                '<button class=\"audio-regen-btn\" onclick=\"generateDualSpeech(' + idx + ',\'' + type + '\')\" title=\"重新生成\">🔄</button>';
        }

        function updateDualProgress(idx, type) {
            var key = getAudioKey(idx, type); var st = audioState[key]; if (!st) return;
            var dur = st.audio.duration || 0; var cur = st.audio.currentTime || 0;
            var pct = dur > 0 ? Math.round((cur/dur)*100) : 0;
            var prefix = type === 'template' ? 'tpl-' : '';
            var slider = document.querySelector('#' + prefix + 'audioControls-' + idx + ' .audio-progress');
            var timeEl = document.querySelector('#' + prefix + 'audioControls-' + idx + ' .audio-time');
            if (slider) slider.value = pct;
            if (timeEl) timeEl.textContent = formatTime(cur) + ' / ' + formatTime(dur);
            var subtitle = '';
            // 字幕：所有音频类型都提取当前句子
            if (st.sentenceTimings && st.sentenceTimings.length > 0 && dur > 0) {
                if (type === 'commentary') {
                    var subtitleEl = document.getElementById('subtitle-' + idx);
                    if (subtitleEl) subtitleEl.style.display = 'block';
                }
                var progress = cur / dur;
                var found = st.sentenceTimings[0].text;
                var foundIdx = 0;
                for (var i = 0; i < st.sentenceTimings.length; i++) {
                    var t = st.sentenceTimings[i];
                    if (progress >= t.start && progress < t.end) { found = t.text; foundIdx = i; break; }
                    if (progress >= t.end) { found = t.text; foundIdx = i; }
                }
                subtitle = found;
                // 下一句（KTV歌词式预览）
                var nextSub = '';
                if (foundIdx + 1 < st.sentenceTimings.length) {
                    nextSub = st.sentenceTimings[foundIdx + 1].text;
                }
                if (type === 'commentary') {
                    var se = document.getElementById('subtitle-' + idx);
                    if (se) se.innerHTML = '<span class=\"sub-active\">' + esc(found) + '</span>';
                }
            }
            // WebSocket 推送（节流 250ms）
            var now = Date.now();
            if (now - _wsLastSend >= 250) {
                _wsLastSend = now;
                _wsActiveIdx = idx;
                _wsActiveType = type;
                var data = resultsMap[idx] || {};
                var wsMsg = {
                    type: 'playback_state',
                    index: idx,
                    name: data.name || '',
                    audio_type: type,
                    playing: st.playing || false,
                    current_time: cur,
                    duration: dur,
                    subtitle: subtitle,
                    next_subtitle: nextSub,
                    progress: dur > 0 ? (cur / dur) : 0,
                    speed: _playbackRate
                };
                wsSend(wsMsg);
            }
        }

        function toggleDualAudio(idx, type) {
            var key = getAudioKey(idx, type); var st = audioState[key]; if (!st) return;
            if (st.playing) { st.audio.pause(); st.playing = false; }
            else {
                Object.keys(audioState).forEach(function(k){ if(k!=key&&audioState[k]&&audioState[k].playing){audioState[k].audio.pause();audioState[k].playing=false;renderDualControls(audioState[k].idx,audioState[k].type);} });
                st.audio.play(); st.playing = true;
            }
            renderDualControls(idx, type);
            // 立即推送状态
            _wsLastSend = 0;
            updateDualProgress(idx, type);
        }

        function seekDualAudio(idx, type, pct) {
            var key = getAudioKey(idx, type); var st = audioState[key];
            if (!st || !st.audio.duration) return;
            st.audio.currentTime = (pct / 100) * st.audio.duration;
        }

        async function regenTemplateText(idx) {
            var allBtns = document.querySelectorAll('#expandContent-' + idx + ' .edit-btn-inline');
            var btn = null;
            for (var i = 0; i < allBtns.length; i++) {
                if (allBtns[i].getAttribute('onclick') && allBtns[i].getAttribute('onclick').indexOf('regenTemplateText') >= 0) {
                    btn = allBtns[i]; break;
                }
            }
            if (btn) { btn.textContent = '⏳ 生成中...'; btn.disabled = true; }
            var data = resultsMap[idx];
            if (data) {
                // 先获取最新模板配置
                try {
                    var cfgResp = await fetch('/api/admin/config');
                    var cfg = await cfgResp.json();
                    var tpl = cfg.commentary_template || '';
                    // 用模板 + 数据渲染
                    var d = data;
                    var num = (d.index !== undefined) ? (d.index + 1) : '?';
                    // 特殊模板单元：整句「本件拍品[原盒/证书]」替换
                    var certVal = d.certificate || '';
                    var certReplace = '';
                    if (certVal === '有/无') certReplace = '本件拍品有窑口原配盒子';
                    else if (certVal === '有/有') certReplace = '本件拍品有证书有窑口原配盒子';
                    else if (certVal === '无/有') certReplace = '本件拍品有证书';
                    // 无/无 或空值 → certReplace 保持 ''（整句移除）
                    var fresh = tpl.replace(/本件拍品\[原盒\/证书\]/g, certReplace)
                        .replace(/\[序号\]/g, num)
                        .replace(/\[拍品名字\]/g, d.name || '无')
                        .replace(/\[款识\]/g, d.inscription || '无')
                        .replace(/\[窑口\]/g, d.kiln || '无')
                        .replace(/\[年份\]/g, d.era || '无')
                        .replace(/\[年代\]/g, d.era || '无')
                        .replace(/\[尺寸\]/g, d.size || '无')
                        .replace(/\[容量\]/g, d.capacity || d.size || '无')
                        .replace(/\[品相\]/g, d.condition || '无')
                        .replace(/\[参考价\]/g, d.estimate || '无')
                        .replace(/\[起拍价\]/g, d.starting_price || '无')
                        .replace(/\[材质\]/g, d.material || '无')
                        .replace(/\[市场参考价\]/g, d.estimate || '无');
                    // 清理空值/无值字段
                    fresh = fresh.replace(/\[[^\]]+\]/g, '');  // 移除未替换的占位符
                    fresh = fresh.replace(/[，、；][^，。]*?无[^，。]*?(?=[，。]|$)/g, '');  // 移除"无"值含后缀
                    fresh = fresh.replace(/[，、；]{2,}/g, '，');
                    fresh = fresh.replace(/^[，、；]\s*/g, '');
                    fresh = fresh.replace(/[，、；]\s*$/g, '');
                    fresh = fresh.replace(/[，、；]\s*。/g, '。');
                    data.template_text = fresh;
                    var textEl = document.getElementById('tplText-' + idx);

        async function runPrediction() {
            var card = document.getElementById('predictCard');
            card.querySelector('.val').textContent = '⏳';

            var items = [];
            for (var i = 0; i < allItems.length; i++) {
                var d = resultsMap[i];
                if (d) {
                    items.push({
                        name: d.name || '', kiln: d.kiln || '', code: d.code || '',
                        starting_price: d.starting_price || '', estimate: d.estimate || '',
                        era: d.era || '', material: d.material || '', size: d.size || '',
                        capacity: d.capacity || '', condition: d.condition || '',
                        inscription: d.inscription || '', description: d.description || ''
                    });
                } else {
                    var s = allItems[i];
                    items.push({
                        name: s.name || '', kiln: s.kiln || '', code: s.code || '',
                        starting_price: s.starting_price || '', estimate: s.estimate || ''
                    });
                }
            }

            if (items.length === 0) return;

            try {
                var resp = await fetch('/api/predict/revenue', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({items: items, session_date: ''})
                });
                var json = await resp.json();
                if (json.error) {
                    card.innerHTML = '<span class="val" style="color:#e74c3c">—</span><span class="lbl">' + esc(json.error) + '</span>';
                    return;
                }
                var fmt = function(n) { return (n || 0).toLocaleString(); };
                card.querySelector('.val').className = 'val predict-val';
                card.querySelector('.val').textContent = '¥' + fmt(json.low);
                // 移动端长按显示
                var valEl = card.querySelector('.val');
                var pressTimer;
                valEl.addEventListener('touchstart', function() { pressTimer = setTimeout(function() { valEl.classList.add('reveal'); }, 500); });
                valEl.addEventListener('touchend', function() { clearTimeout(pressTimer); });
                valEl.addEventListener('touchmove', function() { clearTimeout(pressTimer); valEl.classList.remove('reveal'); });
                valEl.addEventListener('click', function() { valEl.classList.toggle('reveal'); });
                card.querySelector('.lbl').innerHTML = '预估成交 <em class="conf-' + json.confidence + '">' +
                    ({high:'高',medium:'中',low:'低',very_low:'极低'})[json.confidence] + '</em>';
            } catch (err) {
                card.querySelector('.val').textContent = '—';
                card.querySelector('.lbl').textContent = '预估失败';
            }
        }

        function getPipJS() {
            return '(' + function() {
                var _state = null;
                var _finished = {};

                // 字号持久化——直接改元素 style，不依赖 CSS 变量
                var _fs = 36;
                try { var saved = localStorage.getItem('pip_font_size'); if (saved) _fs = parseInt(saved) || 36; } catch(e) {}
                function applyFs() {
                    var cur = document.getElementById('sc');
                    var nxt = document.getElementById('sn');
                    if (cur) cur.style.fontSize = _fs + 'px';
                    if (nxt) nxt.style.fontSize = Math.round(_fs * 0.55) + 'px';
                    var fv = document.getElementById('fsVal');
                    if (fv) fv.textContent = _fs;
                }
                applyFs();
                window.adjFs = function(delta) {
                    _fs = Math.max(20, Math.min(100, _fs + delta));
                    applyFs();
                    try { localStorage.setItem('pip_font_size', _fs); } catch(e) {}
                };

                window.addEventListener('message', function(e) {
                    if (!e.data || !e.data.type) return;
                    var m = e.data;
                    if (m.type === 'playback_state') {
                        var oldIdx = _state ? _state.index : -1;
                        if (m.index !== oldIdx) _finished = {};
                        _state = m;
                        if (m.playing) delete _finished[m.index + '_' + m.audio_type];
                        updateUI(m);
                    } else if (m.type === 'idle') {
                        if (_state) {
                            _finished[_state.index + '_' + _state.audio_type] = true;
                            _state.playing = false; _state.progress = 0; _state.current_time = _state.duration || 0;
                            updateUI(_state);
                            showFinished(_state.audio_type);
                        }
                    } else if (m.type === 'no_audio') {
                        if (_state) { _state.playing = false; updateUI(_state); }
                        document.getElementById('sa').className = 'sub-area idle';
                        document.getElementById('sc').textContent = '';
                        document.getElementById('sn').textContent = '';
                        document.getElementById('st').style.display = 'block';
                        document.getElementById('st').textContent = '当前没有音频';
                        _lastSub = '';
                        resetBtns();
                    }
                });

                function sendToOpener(msg) {
                    msg.from = 'auction_pip';
                    try { window.opener.postMessage(msg, '*'); } catch(e) {}
                }
                // 通知主页面 PiP 已就绪
                sendToOpener({type:'pip_ready'});

                var _lastSub = '';
                function updateUI(m) {
                    if (!m) {
                        document.getElementById('sa').className = 'sub-area idle';
                        document.getElementById('sc').textContent = '';
                        document.getElementById('sn').textContent = '';
                        document.getElementById('st').style.display = 'block';
                        document.getElementById('st').textContent = '等待播放…';
                        document.getElementById('nm').textContent = '-';
                        document.getElementById('pn').textContent = '';
                        _lastSub = '';
                        resetBtns(); return;
                    }
                    document.getElementById('st').style.display = 'none';
                    var num = (m.index !== undefined) ? (m.index + 1) : '?';
                    document.getElementById('nm').textContent = num;
                    document.getElementById('pn').textContent = '#' + num + ' ' + (m.name || '');
                    // 更新倍速显示
                    if (m.speed) {
                        _curSpeed = m.speed;
                        var spd = document.getElementById('spd');
                        var label = m.speed.toFixed(2).replace(/0+$/,'').replace(/\.$/,'') + 'x';
                        if (spd) spd.textContent = label;
                        var items = document.querySelectorAll('#spdDrop div');
                        items.forEach(function(el) { el.classList.remove('active'); });
                        items.forEach(function(el) { if (el.textContent === label) el.classList.add('active'); });
                    }
                    if (m.subtitle) {
                        document.getElementById('sa').className = 'sub-area';
                        // KTV 切换动画：句子变了触发 fade
                        if (m.subtitle !== _lastSub) {
                            var curEl = document.getElementById('sc');
                            curEl.style.opacity = '0';
                            setTimeout(function() {
                                curEl.textContent = m.subtitle;
                                curEl.style.opacity = '1';
                            }, 150);
                            _lastSub = m.subtitle;
                        } else {
                            document.getElementById('sc').textContent = m.subtitle;
                        }
                        // 下一句预览
                        var nextEl = document.getElementById('sn');
                        if (m.next_subtitle) {
                            nextEl.textContent = m.next_subtitle;
                            nextEl.style.display = 'block';
                        } else {
                            nextEl.textContent = '';
                            nextEl.style.display = 'none';
                        }
                    }
                    updateBtns(m);
                }

                function updateBtns(m) {
                    var idx = m.index || 0;
                    var tf = _finished[idx + '_template'];
                    var cf = _finished[idx + '_commentary'];
                    if (tf) { showFinishedBtn('t', 'ft', 'bt', 'ct', '固定介绍'); }
                    else if (m.audio_type === 'template') { updateBtn('t', 'ft', 'bt', 'ct', '固定介绍', true, m.playing && m.audio_type === 'template', m.progress||0, m.duration||0, m.current_time||0); }
                    else { updateBtn('t', 'ft', 'bt', 'ct', '固定介绍', false, false, 0, 0, 0); }

                    if (cf) { showFinishedBtn('c', 'fc', 'bc', 'cc', '拍品亮点'); }
                    else if (m.audio_type === 'commentary') { updateBtn('c', 'fc', 'bc', 'cc', '拍品亮点', true, m.playing && m.audio_type === 'commentary', m.progress||0, m.duration||0, m.current_time||0); }
                    else { updateBtn('c', 'fc', 'bc', 'cc', '拍品亮点', false, false, 0, 0, 0); }
                }

                function updateBtn(suf, fid, bid, cid, label, isActive, isPlaying, progress, duration, cur) {
                    var b = document.getElementById(bid);
                    var f = document.getElementById(fid);
                    var c = document.getElementById(cid);
                    b.classList.toggle('playing', isPlaying);
                    f.style.width = (isActive ? (progress * 100) : 0) + '%';
                    b.querySelector('.ilabel').textContent = (isPlaying ? '⏸ ' : '▶ ') + label;
                    if (isPlaying && duration > 0) {
                        var rem = Math.max(0, Math.ceil(duration - cur));
                        c.textContent = '-' + Math.floor(rem/60) + ':' + (rem%60<10?'0':'') + (rem%60);
                        c.style.display = 'inline';
                    } else { c.textContent = ''; c.style.display = 'none'; }
                }

                function showFinishedBtn(suf, fid, bid, cid, label) {
                    document.getElementById(bid).classList.remove('playing');
                    document.getElementById(bid).querySelector('.ilabel').textContent = '▶ ' + label;
                    document.getElementById(fid).style.width = '100%';
                    var c = document.getElementById(cid);
                    c.textContent = '已播放'; c.style.display = 'inline';
                }

                function showFinished(type) {
                    document.getElementById('sa').className = 'sub-area idle';
                    document.getElementById('sc').textContent = '';
                    document.getElementById('sn').textContent = '';
                    document.getElementById('st').style.display = 'block';
                    document.getElementById('st').textContent = '播放完成';
                    _lastSub = '';
                    showFinishedBtn(type==='template'?'t':'c', type==='template'?'ft':'fc', type==='template'?'bt':'bc', type==='template'?'ct':'cc', type==='template'?'固定介绍':'拍品亮点');
                    var other = type==='template'?'c':'t';
                    updateBtn(other, 'f'+other, 'b'+other, 'c'+other, other==='t'?'固定介绍':'拍品亮点', false, false, 0, 0, 0);
                }

                function resetBtns() {
                    updateBtn('t','ft','bt','ct','固定介绍',false,false,0,0,0);
                    updateBtn('c','fc','bc','cc','拍品亮点',false,false,0,0,0);
                }

                window.pipClick = function(type) {
                    if (!_state) return;
                    var isActive = (_state.audio_type === type);
                    if (isActive && _state.playing) {
                        sendToOpener({type:'control', action:'pause', index:_state.index, audio_type:type});
                        _state.playing = false; updateBtns(_state);
                    } else if (isActive && !_state.playing) {
                        sendToOpener({type:'control', action:'play', index:_state.index, audio_type:type});
                        _state.playing = true; updateBtns(_state);
                    } else {
                        _state.audio_type = type; _state.playing = true; _state.progress = 0; _state.current_time = 0;
                        updateBtns(_state);
                        sendToOpener({type:'control', action:'play', index:_state.index, audio_type:type});
                    }
                };

                var _speedRates = [0.75, 1.0, 1.25, 1.5, 2.0];
                var _curSpeed = 1.0;

                // 构建下拉菜单 + 初始化高亮
                (function() {
                    var drop = document.getElementById('spdDrop');
                    var html = '';
                    _speedRates.forEach(function(r) {
                        var label = r.toFixed(2).replace(/0+$/,'').replace(/\.$/,'') + 'x';
                        var cls = (r === _curSpeed) ? ' class=\"active\"' : '';
                        html += '<div' + cls + ' onclick=\"pipSetSpeed(' + r + ')\">' + label + '</div>';
                    });
                    drop.innerHTML = html;
                })();

                window.pipToggleSpeed = function() {
                    var drop = document.getElementById('spdDrop');
                    drop.classList.toggle('show');
                };

                window.pipSetSpeed = function(rate) {
                    _curSpeed = rate;
                    var spd = document.getElementById('spd');
                    if (spd) spd.textContent = rate.toFixed(2).replace(/0+$/,'').replace(/\.$/,'') + 'x';
                    // 高亮当前选项
                    var items = document.querySelectorAll('#spdDrop div');
                    items.forEach(function(el) { el.classList.remove('active'); });
                    var label = rate.toFixed(2).replace(/0+$/,'').replace(/\.$/,'') + 'x';
                    items.forEach(function(el) { if (el.textContent === label) el.classList.add('active'); });
                    document.getElementById('spdDrop').classList.remove('show');
                    sendToOpener({type:'control', action:'set_speed', speed: rate, index: _state ? _state.index : 0});
                };

                // 点击空白关闭下拉
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('.speed-wrap')) {
                        document.getElementById('spdDrop').classList.remove('show');
                    }
                });

                window.pipNav = function(delta) {
                    var curIdx = _state ? _state.index : (_pendingIndex !== null ? _pendingIndex : 0);
                    var targetIdx = curIdx + delta;
                    if (targetIdx < 0) return;  // 已是第一件，不再往前
                    _pendingIndex = targetIdx;
                    _state = null; _finished = {};
                    document.getElementById('sa').className = 'sub-area idle';
                    document.getElementById('sc').textContent = '';
                    document.getElementById('sn').textContent = '';
                    document.getElementById('st').style.display = 'block';
                    document.getElementById('st').textContent = '等待播放…';
                    document.getElementById('nm').textContent = targetIdx + 1;
                    _lastSub = '';
                    resetBtns();
                    sendToOpener({type:'control', action:'select_item', index:targetIdx});
                };
            }.toString() + ')();';
        }

        // ===== 批量生成 TTS =====
        var _batchRunning = false;
        var _batchAbort = false;

        async function batchGenerate(type) {
            if (_batchRunning) { _batchAbort = true; return; }
            if (!allItems.length) return;
            // 校验：所有拍品必须已分析完毕
            var missing = [];
            for (var i = 0; i < allItems.length; i++) {
                if (!resultsMap[i]) missing.push(i + 1);
            }
            if (missing.length > 0) {
                alert('以下拍品尚未分析完毕，请等待分析完成后再批量生成：\n#' + missing.join(', #'));
                return;
            }
            // 弹窗确认
            var confirmLabel = type === 'template' ? '固定介绍' : '拍品亮点';
            if (!confirm('批量生成会覆盖当前所有拍品的【' + confirmLabel + '】音频，是否继续？')) return;
            _batchRunning = true; _batchAbort = false;
            var label = type === 'template' ? '固定介绍' : '拍品亮点';
            var btn = document.getElementById(type === 'template' ? 'batchTemplateBtn' : 'batchCommentaryBtn');
            var progressEl = document.getElementById('batchProgress');
            var voice = document.getElementById('globalVoice').value;
            var speed = parseFloat(document.getElementById('globalSpeed').value) || 1.0;
            btn.textContent = '⏹ 停止';
            btn.style.background = '#e74c3c';
            progressEl.style.display = 'inline';
            var total = allItems.length;
            var done = 0;
            for (var i = 0; i < total; i++) {
                if (_batchAbort) break;
                var item = allItems[i];
                var idx = item.index !== undefined ? item.index : i;
                var data = resultsMap[idx];
                if (!data) continue;
                var text = getAudioText(data, type);
                if (!text || text.length < 5) continue;
                progressEl.textContent = label + ': ' + done + '/' + total;
                try {
                    var resp = await fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:text, voice:voice, index:idx, audio_type:type, speed:speed}), cache:'no-store' });
                    if (resp.ok) {
                        if (type === 'template') data._has_template_audio = true;
                        else data._has_commentary_audio = true;
                        updateAudioStatus(idx);
                        // 立即加载音频播放器到展开区
                        loadCachedAudioIfExists(idx, type);
                        done++;
                    }
                } catch(e) {}
            }
            _batchRunning = false;
            btn.textContent = type === 'template' ? '📋 批量生成固定介绍' : '🎙 批量生成拍品亮点';
            btn.style.background = '';
            progressEl.textContent = '完成 ' + done + '/' + total;
            setTimeout(function() { progressEl.style.display = 'none'; }, 3000);
        }

        // ===== 自动加载缓存 =====
        async function autoLoadCache() {
            var url = document.getElementById('feishuUrl').value.trim();
            if (!url) return;
            // 显示加载状态
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa;font-size:1em">⏳ 正在检查数据更新…</td></tr>';
            try {
                var resp = await fetch('/api/cache-status?feishu_url=' + encodeURIComponent(url));
                var json = await resp.json();
                if (json.matched && json.items) {
                    // 缓存命中，直接显示
                    allItems = json.items.map(function(it, i) { it.index = i; return it; });
                    totalCount = allItems.length;
                    allItems.forEach(function(item) {
                        resultsMap[item.index] = item;
                    });
                    document.getElementById('totalBadge').textContent = totalCount;
                    document.getElementById('resultSection').classList.remove('hidden');
                    document.getElementById('batchBar').style.display = 'flex';
                    buildTable();
                    buildSummary(allItems);
                    allItems.forEach(function(item, i) {
                        setRowStatus(i, 'done');
                    });
                    document.getElementById('btnText').textContent = '强制更新';
                } else {
                    // 缓存未命中，显示提示
                    document.getElementById('resultSection').classList.remove('hidden');
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#e67e22;font-size:1em">飞书内容有更新，需要重新分析</td></tr>';
                    document.getElementById('btnText').textContent = '开始分析';
                }
            } catch(e) {
                console.error('自动加载缓存失败:', e);
                document.getElementById('btnText').textContent = '开始分析';
            }
        }

        // 页面加载时自动检测缓存
        autoLoadCache();
    </script>
